<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULGI Pro - Баян-Өлгий Ауа райы</title>
    <!-- Chart.js кітапханасы (Climate 2050 графигі үшін) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Дизайн жүйесі */
        :root {
            --bg: #121212;
            --ice: #00e5ff;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --card-bg: #1e1e1e;
        }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .loading {
            opacity: 0.5;
            pointer-events: none;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 0.8; }
            100% { opacity: 0.5; }
        }

        h2 { border-bottom: 2px solid var(--ice); padding-bottom: 8px; }
        #rml { font-size: 0.9em; color: var(--text-muted); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>ULGI Pro - Risk AI & Climate</h2>
        <div id="rml">Модельдер жүктелуде...</div>
        
        <div id="ai-decision" class="loading">
            Жасанды интеллект кеңесі дайындалуда...
        </div>
    </div>

    <div class="card">
        <h2>Климат 2050 Болжамы</h2>
        <canvas id="climChart" width="400" height="200"></canvas>
    </div>

    <script>
        // ==========================================
        // ГЛОБАЛДЫ АЙНЫМАЛЫЛАР
        // ==========================================
        var _gLat = 48.9667; // Баян-Өлгий ендігі
        var _gLon = 89.9667; // Баян-Өлгий бойлығы
        var _gFlood = null;  // Су тасқыны деректері
        var _cChart = null;  // Chart.js нысаны
        
        // 3-ТҮЗЕТУ: gModel айнымалысы жарияланды
        var gModel = 'GraphCast'; 

        // ==========================================
        // ОФЛАЙН ЖҰМЫС (PWA КЭШТЕУ)
        // ==========================================
        function setC(key, val) { 
            localStorage.setItem(key, JSON.stringify(val)); 
        }
        
        function getC(key) { 
            var item = localStorage.getItem(key);
            return item ? JSON.parse(item) : null; 
        }

        function showC2050Fallback() {
            console.warn("Координаталар табылмады. Қосымша жүйе қосылды.");
        }

        // ==========================================
        // OPEN-METEO CLIMATE API ЖҮКТЕУ
        // ==========================================
        function fetchClimate2050() {
            // 1-ТҮЗЕТУ: gLat және gLon орнына _gLat және _gLon қолданылды
            if(!_gLat || !_gLon) { 
                showC2050Fallback(); 
                return Promise.resolve(); 
            }
            
            var url = 'https://climate-api.open-meteo.com/v1/climate'
                    + '?latitude=' + _gLat 
                    + '&longitude=' + _gLon 
                    + '&models=MPI_ESM1_2_XR&daily=temperature_2m_max';
            
            return fetch(url)
                .then(res => res.json())
                .then(data => {
                    console.log('Climate 2050 деректері:', data);
                    setC('climate_cache', data);
                })
                .catch(err => console.error("Climate қатесі:", err));
        }

        // ==========================================
        // СУ ТАСҚЫНЫ ҚАУПІН ТАЛДАУ
        // ==========================================
        function renderFlood() {
            // 2-ТҮЗЕТУ: gFD орнына _gFlood глобалды айнымалысы қолданылды
            if(_gFlood && _gFlood.daily && (_gFlood.daily.river_discharge || []).length) {
                var dis = _gFlood.daily.river_discharge;
                console.log("Су тасқыны қаупі анықталды. Ағын көлемі:", dis);
            } else {
                console.log("Су тасқыны қаупі жоқ немесе деректер келмеді.");
            }
        }

        // ==========================================
        // ТӘУЕКЕЛДІ ЕСЕПТЕУ ЖӘНЕ UI ЖАҢАРТУ
        // ==========================================
        function computeRisk(c) {
            var rml = document.getElementById('rml');
            // 3-ТҮЗЕТУ: gModel енді анықталған, 'loading...' резервімен жұмыс істейді
            rml.textContent = 'GraphCast→AIFS→ECMWF · ' + (gModel || 'loading...') + ' · 14d · Баян-Өлгий';
        }

        // ==========================================
        // САҒАТТЫҚ АУА РАЙЫ (UNDEFINED ҚОРҒАНЫСЫ)
        // ==========================================
        function rHourly(h) {
            if(!h || !h.temperature_2m) return;
            
            for(var i = 0; i < 10; i++) {
                // 4-ТҮЗЕТУ: Math.round ішіне undefined түспеуі үшін (|| 0) қорғанысы қойылды
                var ht = Math.round(h.temperature_2m[i] || 0);
                var hw = h.wind_speed_10m[i] || 0;
                // Бұл жерде сағаттық UI рендеринг логикасы болады
            }
        }

        // ==========================================
        // КЛИМАТ ГРАФИГІН ҚҰРУ (CHART.JS)
        // ==========================================
        function buildClimChart() {
            var ctx = document.getElementById('climChart').getContext('2d');
            
            // 5-ТҮЗЕТУ: cChart орнына глобалды _cChart қолданылды
            if(_cChart) {
                _cChart.destroy();
            }
            
            _cChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['2030', '2040', '2050'],
                    datasets: [{
                        label: 'Орташа температура болжамы (°C)',
                        data: [2, 3.5, 4.8],
                        borderColor: '#00e5ff',
                        backgroundColor: 'rgba(0, 229, 255, 0.2)',
                        borderWidth: 2,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // ==========================================
        // ЖАСАНДЫ ИНТЕЛЛЕКТ КЕҢЕСІ
        // ==========================================
        function getAIDecision() {
            var el = document.getElementById('ai-decision');
            
            // Симуляцияланған AI сұранысы
            new Promise(resolve => setTimeout(() => resolve("Алдағы күндері боран күтілуде. Малшыларға таулы аймақтардан сақ болу ұсынылады."), 1500))
                .then(advice => {
                    el.textContent = advice;
                })
                .catch(err => {
                    el.textContent = "AI қызметіне қосылу мүмкін болмады.";
                })
                // 6-ТҮЗЕТУ: .finally?el:null; қате синтаксисі дұрыс стандартқа ауыстырылды
                .finally(function() { 
                    el.classList.remove('loading'); 
                });
        }

        // ==========================================
        // БАСТАПҚЫ ІСКЕ ҚОСУ (INIT)
        // ==========================================
        function fetchWx() {
            computeRisk();
            fetchClimate2050();
            renderFlood();
            getAIDecision();
            
            // Мысал үшін сағаттық деректерді тексеру
            rHourly({
                temperature_2m: [-15.4, -14.8, null, -12.1], // null мәні 0-ге айналады
                wind_speed_10m: [5, 6, 8, 12]
            });
        }

        // Құжат жүктелгенде іске қосылады
        window.onload = function() {
            buildClimChart();
            fetchWx();
        };
    </script>
</body>
</html>
