<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULGI Pro — Баян-Өлгий</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #030912; --s1: #081428; --s2: #0c1a32; --ice: #50e8ff; --sky: #3a9aff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: #ddeeff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 430px; margin: 0 auto; padding-bottom: 80px; }
        /* Gate */
        #gate {
            position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000; transition: 0.4s;
        }
        .g-logo { font-family: 'Cormorant Garamond', serif; font-size: 52px; letter-spacing: 8px; background: linear-gradient(90deg, #50e8ff, #3a9aff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 30px 0; }
        .pkey {
            width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(80,140,255,0.3); color: white; font-size: 26px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
        }
        .dot { width: 14px; height: 14px; border: 2px solid #50e8ff; border-radius: 50%; }
        .dot.on { background: #50e8ff; }
        /* App */
        #app { display: none; }
        .topbar { padding: 20px 16px; display: flex; justify-content: space-between; align-items: center; }
        .hero { background: linear-gradient(160deg, #081830, #040e1c); padding: 24px; border-radius: 24px; margin: 12px; text-align: center; }
        .heroTemp { font-size: 92px; font-weight: 300; font-family: 'Cormorant Garamond', serif; }
        /* Navigation */
        .bnav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 430px; background: rgba(3,9,18,0.95);
            display: flex; justify-content: space-around; padding: 8px 0; z-index: 1000;
        }
        .bni { text-align: center; color: #6888aa; cursor: pointer; }
        .bni.on { color: #50e8ff; }
    </style>
</head>
<body>

<!-- GATE (Кіру) -->
<div id="gate">
    <div class="g-logo">ULGI</div>
    <p style="margin:10px 0 30px; color:#6888aa;">Баян-Өлгий • Risk Intelligence Pro</p>
    
    <div style="display:flex; gap:8px; margin-bottom:30px;">
        <div class="lang-btn on" onclick="switchLang(this, 'kk')">ҚАЗ</div>
        <div class="lang-btn" onclick="switchLang(this, 'mn')">МОН</div>
        <div class="lang-btn" onclick="switchLang(this, 'en')">ENG</div>
    </div>

    <div class="dots" style="display:flex; gap:16px; margin:30px 0;">
        <div class="dot" id="d0"></div>
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
    </div>

    <div class="keypad">
        <div class="pkey" onclick="pk(1)">1</div><div class="pkey" onclick="pk(2)">2</div><div class="pkey" onclick="pk(3)">3</div>
        <div class="pkey" onclick="pk(4)">4</div><div class="pkey" onclick="pk(5)">5</div><div class="pkey" onclick="pk(6)">6</div>
        <div class="pkey" onclick="pk(7)">7</div><div class="pkey" onclick="pk(8)">8</div><div class="pkey" onclick="pk(9)">9</div>
        <div class="pkey"></div>
        <div class="pkey" onclick="pk(0)">0</div>
        <div class="pkey" onclick="pdel()">⌫</div>
    </div>
    <div id="gErr" style="color:#ff2850; margin-top:15px; min-height:20px;"></div>
</div>

<!-- MAIN APP -->
<div id="app" class="container">

    <div class="topbar">
        <div style="font-family:'Cormorant Garamond',serif; font-size:24px; letter-spacing:4px;">ULGI <span style="font-size:12px; background:#1850d8; padding:2px 6px; border-radius:4px;">PRO</span></div>
        <div onclick="doRef()" style="cursor:pointer;"><i class="fas fa-sync-alt"></i></div>
    </div>

    <!-- HERO -->
    <div class="hero" id="heroCard">
        <div id="heroIco" style="font-size:80px; margin-bottom:10px;">🌨</div>
        <div id="heroTemp" class="heroTemp">-11<sup>°</sup></div>
        <div id="heroCond" style="font-size:18px; color:#88aadd;">Қарлы, желді</div>
    </div>

    <div style="padding:0 16px;">
        <h3 style="margin:20px 0 10px; color:#50e8ff;">Risk AI</h3>
        <div style="background:#0c1a32; padding:16px; border-radius:16px; border:1px solid #50e8ff33;">
            <div style="font-size:32px; font-weight:300;" id="riskScore">68</div>
            <div style="color:#ffcc28;">Орташа қауіп • Жел 12 м/с</div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bnav">
        <div class="bni on" onclick="goTab('home')"><i class="fas fa-home"></i><br><small>Үй</small></div>
        <div class="bni" onclick="goTab('ai')"><i class="fas fa-shield-alt"></i><br><small>Risk AI</small></div>
        <div class="bni" onclick="goTab('radar')"><i class="fas fa-satellite"></i><br><small>Радар</small></div>
        <div class="bni" onclick="goTab('settings')"><i class="fas fa-cog"></i><br><small>Баптау</small></div>
    </div>
</div>

<script>
// ==================== ТҮЗЕТІЛГЕН ТОЛЫҚ JS ====================
let currentPin = '';
let lang = 'kk';

function switchLang(el, l) {
    lang = l;
    document.querySelectorAll('.lang-btn').forEach(e => e.classList.remove('on'));
    el.classList.add('on');
}

function pk(num) {
    if (currentPin.length >= 4) return;
    currentPin += num;
    updateDots();
    if (currentPin.length === 4) {
        setTimeout(checkPin, 150);
    }
}

function pdel() {
    currentPin = currentPin.slice(0, -1);
    updateDots();
}

function updateDots() {
    for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('d' + i);
        if (dot) dot.classList.toggle('on', i < currentPin.length);
    }
}

function checkPin() {
    // Демода кез келген 4 сан жұмыс істейді
    if (currentPin.length === 4) {
        unlockApp();
    } else {
        document.getElementById('gErr').textContent = 'PIN қате!';
        setTimeout(() => {
            currentPin = '';
            updateDots();
            document.getElementById('gErr').textContent = '';
        }, 800);
    }
}

function unlockApp() {
    document.getElementById('gate').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initMainApp();
    }, 500);
}

function initMainApp() {
    // Demo data
    document.getElementById('heroTemp').innerHTML = '-14<sup>°</sup>';
    document.getElementById('heroCond').textContent = 'Қатты жел + қар';
    document.getElementById('riskScore').textContent = '74';
    console.log('✅ ULGI Pro жүктелді');
}

function doRef() {
    alert('Деректер жаңартылды (демо)');
}

function goTab(tab) {
    alert(tab.toUpperCase() + ' бетіне өту (демо)');
}

// Глобалдық қолжетімділік
window.pk = pk;
window.pdel = pdel;
window.switchLang = switchLang;
window.doRef = doRef;
window.goTab = goTab;

</script>
</body>
</html>
