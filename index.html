<script>
'use strict';
/* ═══════════════════════════════════════
   AMBIENT SKY CANVAS
   Changes color/particles based on weather
═══════════════════════════════════════ */
(function initSky(){
  const cv=document.getElementById('sky');
  const ctx=cv.getContext('2d');
  let W,H,pts=[];
  window._skyMode='clear'; // updated by renderHero

  const resize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;};
  resize(); addEventListener('resize',resize);

  for(let i=0;i<80;i++) pts.push({
    x:Math.random(),y:Math.random(),
    vx:(Math.random()-.5)*.00028,vy:Math.random()*.00022+.00007,
    r:Math.random()*1.4+.3,a:Math.random()*.5+.07,
    drift:Math.random()*Math.PI*2
  });

  const PALETTES={
    clear:  ['rgba(68,138,255,','rgba(64,196,255, flocks)'],
    rain:   ['rgba(30,60,140,', 'rgba(50,80,180,'],
    snow:   ['rgba(180,200,255,','rgba(200,220,255,'],
    storm:  ['rgba(80,20,120,', 'rgba(60,30,100,'],
    night:  ['rgba(20,30,100,', 'rgba(30,20,80,'],
  };

  (function frame(){
    ctx.clearRect(0,0,W,H);

    // Deep sky gradient — shifts with weather
    const g=ctx.createLinearGradient(0,0,W*0.3,H);
    const m=window._skyMode||'clear';
    const colors={clear:['#050818','#07091f'],rain:['#030510','#050818'],snow:['#080c20','#0a0f28'],storm:['#050010','#080015'],night:['#020308','#040512']};
    const c=colors[m]||colors.clear;
    g.addColorStop(0,c[0]);g.addColorStop(1,c[1]);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

    const pal=PALETTES[m]||PALETTES.clear;
    const now=Date.now()*.0005;
    pts.forEach(p=>{
      p.x+=p.vx+Math.sin(p.drift+now)*.00005;
      p.y+=p.vy;
      p.drift+=.002;
      if(p.x<0||p.x>1)p.vx*=-1;
      if(p.y>1){p.y=0;p.x=Math.random();}
      ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);
      ctx.fillStyle=`${pal[Math.floor(p.r)%2]||pal[0]}${p.a})`;
      ctx.fill();
    });
    requestAnimationFrame(frame);
  })();
})();

/* ═══════════════════════════════════════
   RADAR — Windy-inspired sweep
═══════════════════════════════════════ */
let rLayer='rain', rAF={};
const RCOLS={
  rain: ['64,196,255','68,138,255'],
  wind: ['255,215,64','255,143,0'],
  cloud:['148,163,184','180,200,220'],
  temp: ['255,61,87', '255,143,0']
};

function drawRadar(cvId,timeId,H){
  const cv=document.getElementById(cvId);if(!cv)return;
  const ctx=cv.getContext('2d');
  cv.width=cv.offsetWidth||398;cv.height=H;
  const W=cv.width,cx=W/2,cy=H/2,R=Math.min(W,H)*.44;
  function sr(s){const x=Math.sin(s)*10000;return x-Math.floor(x);}
  let sw=0;
  if(rAF[cvId])cancelAnimationFrame(rAF[cvId]);

  (function frame(){
    ctx.clearRect(0,0,W,H);

    // Deep map background
    ctx.fillStyle='#010208';ctx.fillRect(0,0,W,H);

    // Subtle terrain effect
    const tg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*1.5);
    tg.addColorStop(0,'rgba(10,20,60,.4)');tg.addColorStop(1,'transparent');
    ctx.fillStyle=tg;ctx.fillRect(0,0,W,H);

    // Grid
    ctx.strokeStyle='rgba(64,196,255,.05)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // Range rings with labels
    [.25,.5,.75,1].forEach((r,i)=>{
      ctx.beginPath();ctx.arc(cx,cy,R*r,0,Math.PI*2);
      ctx.strokeStyle='rgba(64,196,255,.10)';ctx.lineWidth=1;ctx.stroke();
      if(i<3){
        ctx.fillStyle='rgba(64,196,255,.3)';ctx.font='9px monospace';
        ctx.fillText(`${Math.round(r*50)}km`,cx+R*r+4,cy-3);
      }
    });

    // Weather blobs — seeded, slow-moving
    const cc=RCOLS[rLayer]||RCOLS.rain;
    const t=Date.now();
    for(let i=0;i<11;i++){
      const phase=t/11000+i*.7;
      const bx=cx+(Math.sin(sr(i*3.7)*Math.PI*2+phase)*.42)*W;
      const by=cy+(Math.cos(sr(i*2.1)*Math.PI*2+phase*.8)*.42)*H;
      const br=22+sr(i*5)*80;
      const ba=.09+sr(i*7)*.2+Math.sin(i+t/9000)*.04;
      const gr=ctx.createRadialGradient(bx,by,0,bx,by,br);
      gr.addColorStop(0,`rgba(${cc[0]},${ba+.14})`);
      gr.addColorStop(.45,`rgba(${cc[1]},${ba*.6})`);
      gr.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    }

    // Sweep line + fading trail
    ctx.save();ctx.translate(cx,cy);ctx.rotate(sw);

    // Trail (semi-transparent sector)
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.arc(0,0,R,-0.6,0);ctx.closePath();
    ctx.fillStyle='rgba(64,196,255,.06)';ctx.fill();

    // Main sweep line
    const sg=ctx.createLinearGradient(0,0,R,0);
    sg.addColorStop(0,'rgba(64,196,255,.9)');sg.addColorStop(1,'transparent');
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(R,0);
    ctx.strokeStyle=sg;ctx.lineWidth=2;ctx.stroke();

    ctx.restore();sw+=.014;

    // Center marker
    ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);
    ctx.fillStyle='#1de9b6';ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,9,0,Math.PI*2);
    ctx.strokeStyle='rgba(29,233,182,.4)';ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(cx,cy,14,0,Math.PI*2);
    ctx.strokeStyle='rgba(29,233,182,.15)';ctx.lineWidth=1;ctx.stroke();

    // Timestamp
    const now2=new Date().toLocaleTimeString('kk-KZ',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    ctx.fillStyle='rgba(64,196,255,.4)';ctx.font='9px monospace';
    ctx.textAlign='right';ctx.fillText(now2,W-8,H-8);ctx.textAlign='left';
    const te=document.getElementById(timeId);if(te)te.innerText=now2;

    rAF[cvId]=requestAnimationFrame(frame);
  })();
}

function setRL(el,grp){

═══════════════════════════════════════ */
const PIN_KEY='ULGI_V27_PIN';
let pBuf='',pMode='';

function initPin(){
  pMode=localStorage.getItem(PIN_KEY)?'verify':'setup';
  document.getElementById('gSub').innerText=
    pMode==='setup'?'Жаңа PIN-код жасаңыз':'PIN кодыңызды теріңіз';
}
function pk(k){
  if(pBuf.length>=4)return;
  pBuf+=k;updDots();
  if(pBuf.length===4)setTimeout(chkPin,180);
}
function pdel(){pBuf=pBuf.slice(0,-1);updDots();document.getElementById('gErr').innerText='';}
function updDots(){for(let i=0;i<4;i++)document.getElementById('d'+i).className='dot'+(i<pBuf.length?' on':'');}
function chkPin(){
  const h=CryptoJS.SHA256(pBuf).toString();
  if(pMode==='setup'){localStorage.setItem(PIN_KEY,h);unlock();}
  else if(h===localStorage.getItem(PIN_KEY)){unlock();}
  else{
    for(let i=0;i<4;i++)document.getElementById('d'+i).className='dot err';
    document.getElementById('gErr').innerText='PIN дұрыс емес.';
    if(navigator.vibrate)navigator.vibrate([80,40,80]);
    setTimeout(()=>{pBuf='';updDots();document.getElementById('gErr').innerText='';},700);
  }
}
function unlock(){
  const g=document.getElementById('gate');
  g.classList.add('out');setTimeout(()=>g.style.display='none',450);
  document.getElementById('app').style.display='block';
  initApp();
}
function resetPin(){if(confirm('PIN кодты жойып, жаңадан орнатасыз ба?')){localStorage.removeItem(PIN_KEY);location.reload();}}

/* ═══════════════════════════════════════
   CACHE — localStorage TTL
═══════════════════════════════════════ */
function setC(k,v){try{localStorage.setItem(k,JSON.stringify({t:Date.now(),v}));}catch(e){}}
function getC(k,m){try{const s=localStorage.getItem(k);if(!s)return null;const o=JSON.parse(s);if(Date.now()-o.t>m*60000)return null;return o.v;}catch{return null;}}
function delC(k){try{localStorage.removeItem(k);}catch(e){}}

/* ═══════════════════════════════════════
   GPS + NOMINATIM REVERSE GEOCODE
═══════════════════════════════════════ */
function startGPS(){
  step('GPS анықталуда...');
  if(!navigator.geolocation){fallback();return;}
  navigator.geolocation.getCurrentPosition(
    async pos=>{
      gLat=pos.coords.latitude;
      gLon=pos.coords.longitude;
      const acc=Math.round(pos.coords.accuracy);
      document.getElementById('lAcc').innerText=`±${acc}м`;
      document.getElementById('lName').innerText='GPS нүктесі';
      const sa=document.getElementById('setAcc');if(sa)sa.innerText=`±${acc}м`;
      step('Мекенжай анықталуда...');
      await geocode(gLat,gLon);
      fetchWx();
    },
    ()=>{step('GPS жоқ...');fallback();},
    {enableHighAccuracy:true,timeout:8000,maximumAge:0}
  );
}

function fallback(){
  const s=SUMS[0];gLat=s.lat;gLon=s.lon;
  gCity=s.n;gAddr=s.n+' сумын · Баян-Өлгий аймаг';
  document.getElementById('lName').innerText=s.n;
  document.getElementById('lAddr').innerText=gAddr;
  fetchWx();
}

function nearestSum(lat,lon){
  let best=SUMS[0],minD=Infinity;
  for(const s of SUMS){
    const dlat=(s.lat-lat)*Math.PI/180;
    const dlon=(s.lon-lon)*Math.PI/180;
    const a=Math.sin(dlat/2)**2+Math.cos(lat*Math.PI/180)*Math.cos(s.lat*Math.PI/180)*Math.sin(dlon/2)**2;
    const d=6371*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    if(d<minD){minD=d;best={...s,dist:d};}
  }
  return best;
}

async function geocode(lat,lon){
  const k=`geo_${lat.toFixed(4)}_${lon.toFixed(4)}`;
  const cached=getC(k,60);
  if(cached){applyGeo(cached);return;}
  try{
    const r=await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=18&addressdetails=1`,
      {headers:{'Accept-Language':'kk,ru,en','User-Agent':'ULGIPro/1.0'}}
    );
    if(!r.ok)throw 0;
    const j=await r.json();
    const a=j.address||{};
    const raw=a.city||a.town||a.village||a.hamlet||a.municipality||a.county||a.state||'';
    const house=a.house_number||'';
    const road=a.road||a.pedestrian||a.footway||a.path||a.residential||'';
    const suburb=a.suburb||a.neighbourhood||a.quarter||'';
    const near=nearestSum(lat,lon);
    const city=near.dist<30?near.n:(raw||near.n);
    const geo={city,house,road,suburb};
    setC(k,geo);applyGeo(geo);
  }catch{
    const near=nearestSum(lat,lon);
    gCity=near.n;gAddr=`${lat.toFixed(5)}°N, ${lon.toFixed(5)}°E`;
    document.getElementById('lName').innerText=gCity;
    document.getElementById('lAddr').innerText=gAddr;
  }
}

function applyGeo(g){
  gCity=g.city;
  document.getElementById('lName').innerText=g.city;
  let line='';
  if(g.house&&g.road) line=`${g.road}, ${g.house}`;
  else if(g.road)     line=g.road;
  if(g.suburb&&line)  line+=` · ${g.suburb}`;
  else if(g.suburb)   line=g.suburb;
  if(!line)           line='Баян-Өлгий аймаг';
  gAddr=line;
  document.getElementById('lAddr').innerText=line;
  const sc=document.getElementById('setCity'),sa=document.getElementById('setAddr');
  if(sc)sc.innerText=g.city;if(sa)sa.innerText=line;
  const sk=document.getElementById('setCoord');
  if(sk&&gLat)sk.innerText=`${gLat.toFixed(5)}°N, ${gLon.toFixed(5)}°E`;
}

/* ═══════════════════════════════════════
   WEATHER FETCH
═══════════════════════════════════════ */
async function fetchWx(){
  if(!gLat||!gLon)return;
  const ck=`wx_${gLat.toFixed(3)}_${gLon.toFixed(3)}`;
  const cached=getC(ck,10);
  if(cached){
    gWD=cached.w;gAD=cached.a;
    renderAll();
    if(isLdrVisible())hideLdr();
    return;
  }

  const showing=isLdrVisible();
  if(showing)step('Ауа-райы жүктелуде...');

  const aURL=`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${gLat}&longitude=${gLon}&current=european_aqi,pm2_5,pm10,nitrogen_dioxide&timezone=auto`;

  for(const model of['best_match','icon_seamless','gfs_global']){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),8000);
      const wURL=`https://api.open-meteo.com/v1/forecast?latitude=${gLat}&longitude=${gLon}&models=${model}`
        +`&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation,relative_humidity_2m,surface_pressure,is_day,uv_index`
        +`&hourly=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,precipitation,precipitation_probability,relative_humidity_2m,uv_index`
        +`&daily=weather_code,temperature_2m_max,temperature_2m_min,wind_speed_10m_max,wind_direction_10m_dominant,precipitation_sum,precipitation_probability_max,uv_index_max,sunrise,sunset`
        +`&timezone=auto&wind_speed_unit=ms&forecast_days=8`;
      if(showing)step(`${model.toUpperCase()} жүктелуде...`);
      const[wr,ar]=await Promise.all([fetch(wURL,{signal:ctrl.signal}),fetch(aURL,{signal:ctrl.signal})]);
      clearTimeout(tid);
      if(!wr.ok)continue;
      gWD=await wr.json();gAD=await ar.json().catch(()=>({}));
      setC(ck,{w:gWD,a:gAD});
      if(showing){step(`✓ ${model}`);setTimeout(hideLdr,400);}
      else toast('✅ '+gCity,'Ауа-райы жаңартылды');
      renderAll();
      return;
    }catch{if(showing)step(`${model} сәтсіз...`);}
  }
  if(showing){step('❌ Интернет жоқ');setTimeout(hideLdr,1200);}
  else toast('❌ Интернет жоқ','Байланысты тексеріңіз');
}

function findIdx(times){
  if(!times)return 0;
  const nowStr=new Date().toISOString().slice(0,13)+':00';
  const idx=times.findIndex(t=>t.startsWith(nowStr));
  return idx!==-1?idx:0;
}

/* ═══════════════════════════════════════
   RENDER ALL
═══════════════════════════════════════ */
function renderAll(){
  if(!gWD)return;
  const c=gWD.current,h=gWD.hourly,d=gWD.daily;
  const idx=findIdx(h.time);
  renderHero(c,d);
  renderAlert(c);
  renderMC(h,idx);
  renderStats(c,h,idx);
  renderHourly(h,idx);
  renderAQI();
  renderDaily(d);
  renderAI(c);
  renderShare(c,d);
  renderQuote();
  renderAlertsTab(c,d);
  updSettings();
  setTimeout(()=>drawRadar('rCv','rT1',220),100);
}

/* ─── HERO ─── */
function renderHero(c,d){
  const t=Math.round(c.temperature_2m),fl=Math.round(c.apparent_temperature);
  const code=wc(c.weather_code);
  const hi=Math.round(d.temperature_2m_max[0]),lo=Math.round(d.temperature_2m_min[0]);
  const sr=d.sunrise?.[0]?.split('T')[1]?.slice(0,5)||'—';
  const ss=d.sunset?.[0]?.split('T')[1]?.slice(0,5)||'—';

  document.getElementById('hIco').innerText=code.i;
  document.getElementById('hT').innerHTML=(t>0?'+':'')+t+'<sup>°</sup>';
  document.getElementById('hT').style.color=t<=-30?'var(--red)':t<=-20?'var(--yellow)':'var(--t0)';
  document.getElementById('hC').innerText=code.t;
  document.getElementById('hFL').innerText=`Сезілуі: ${fl>0?'+':''}${fl}°`;
  document.getElementById('hSR').innerText=sr;
  document.getElementById('hSS').innerText=ss;
  document.getElementById('hHi').innerText=(hi>0?'+':'')+hi+'°';
  document.getElementById('hLo').innerText=lo+'°';
  document.getElementById('hCondBar').innerText=code.t;

  const wcode=c.weather_code;
  window._skyMode=!c.is_day?'night':wcode>=95?'storm':wcode>=70?'snow':wcode>=51?'rain':'clear';

  const hero=document.getElementById('heroCard');
  const glow=document.getElementById('heroGlow');
  if(!c.is_day){
    hero.style.background='linear-gradient(160deg,rgba(10,15,50,.9),rgba(5,6,20,.95))';
    glow.style.background='radial-gradient(circle,rgba(30,60,180,.1),transparent 70%)';
  } else if(wcode===0){
    hero.style.background='linear-gradient(160deg,rgba(20,60,160,.12),rgba(255,200,50,.06),rgba(5,6,15,.92))';
    glow.style.background='radial-gradient(circle,rgba(255,215,64,.12),transparent 70%)';
  } else if(wcode>=70){
    hero.style.background='linear-gradient(160deg,rgba(140,160,200,.08),rgba(5,6,15,.92))';
    glow.style.background='radial-gradient(circle,rgba(200,220,255,.08),transparent 70%)';
  } else if(wcode>=51){
    hero.style.background='linear-gradient(160deg,rgba(30,80,200,.12),rgba(5,6,15,.92))';
    glow.style.background='radial-gradient(circle,rgba(64,196,255,.10),transparent 70%)';
  } else {
    hero.style.background='linear-gradient(160deg,rgba(68,138,255,.07),rgba(5,6,15,.92))';
    glow.style.background='radial-gradient(circle,rgba(68,138,255,.06),transparent 70%)';
  }
}

/* ─── ALERT ─── */
function renderAlert(c){
  const el=document.getElementById('alertEl');
  const t=c.temperature_2m,ws=c.wind_speed_10m;
  let cls='alert-card ac-ok',ico='✅',h='Ауа-райы жайлы',s='Сыртқа шығуға болады';
  if(ws>10)      {cls='alert-card ac-bad';ico='🌪';h='⛔ ДАУЫЛ!';s=`Жел ${ws}м/с — далаға шықпаңыз`;}
  else if(t<=-30){cls='alert-card ac-bad';ico='🥶';h=`⛔ АЯЗ! ${t}°`;s='Балалар мен қарт адамдар үшін қауіпті';}
  else if(t<=-20||ws>4.5){cls='alert-card ac-warn';ico='⚠️';h='Ескерту';s=(t<=-20?`Суық (${t}°). `:'')+(ws>4.5?`Жел ${ws}м/с.`:'');}
  else if(c.precipitation>0){cls='alert-card ac-warn';ico='🌧';h='Жауын-шашын бар';s='Қолшатырыңызды алыңыз';}
  el.className=cls;
  document.getElementById('alertIco').innerText=ico;
  document.getElementById('alertH').innerText=h;
  document.getElementById('alertS').innerText=s;

/* ─── MINUTECAST ─── */
function renderMC(h,idx){
  const probs=[];
  for(let i=0;i<60;i++){
    const hi=idx+Math.floor(i/60);
    const base=(h.precipitation_probability?.[hi])||0;
    probs.push(Math.max(0,Math.min(100,base+Math.sin(i*.3)*7)));
  }
  const mx=Math.round(Math.max(...probs));
  document.getElementById('mcS').innerText=
    mx>60?`🌧 Жаңбыр күтіледі (${mx}%)`:mx>25?`⛅ Аздаған жаңбыр мүмкін (${mx}%)`:`☀️ Жаңбыр болмайды`;

  document.getElementById('mcB').innerHTML=probs.map((p,i)=>{
    const col=p>65?`rgba(68,138,255,${.6+p*.004})`:p>30?`rgba(64,196,255,${.3+p*.005})`:`rgba(64,196,255,${.08+p*.003})`;
    return `<div class="mc-bar" style="height:${4+p*.48}px;background:${col};border-radius:3px 3px 0 0"></div>`;
  }).join('');
}

/* ─── STATS ─── */
function setSt(id,val,pct,sub,badge,bc){
  document.getElementById(`sv-${id}`).innerHTML=val;
  document.getElementById(`sb-${id}`).style.width=pct+'%';
  document.getElementById(`ss-${id}`).innerText=sub;
  const b=document.getElementById(`sbg-${id}`);b.className='st-badge '+bc;b.innerText=badge;
}
function renderStats(c,h,idx){
  const ws=c.wind_speed_10m||0,wg=c.wind_gusts_10m||0;
  const hm=c.relative_humidity_2m||0,pr=Math.round(c.surface_pressure||1013);
  const rn=c.precipitation||0,rp=h.precipitation_probability?.[idx]||0;
  const uv=c.uv_index!=null?c.uv_index:(h.uv_index?.[idx]||0);

  setSt('w',`${ws}<span class="st-unit">м/с</span>`,Math.min(ws/18*100,100),
    `Соққы: ${wg} м/с`,ws>10?'ҚАУІПТІ':ws>4.5?'ЕСКЕРТУ':'Қалыпты',
    ws>10?'b-r':ws>4.5?'b-y':'b-g');

  setSt('h',`${hm}<span class="st-unit">%</span>`,hm,
    `Қысым: ${pr} гПа`,hm<30?'Өте құрғақ':hm>80?'Өте ылғал':'Қалыпты',
    (hm<30||hm>80)?'b-y':'b-g');

  setSt('r',`${rn}<span class="st-unit">мм</span>`,Math.min(rn/15*100,100),
    `Ықтимал: ${rp}%`,rn>10?'Нөсер':rn>2?'Жаңбыр':rn>0?'Сіркіреу':'Жоқ',
    rn>10?'b-r':rn>0?'b-y':'b-g');

  setSt('u',uv.toFixed(1),Math.min(uv/12*100,100),
    `Деңгей: ${uv.toFixed(1)}/12`,uv>=8?'Өте жоғары':uv>=6?'Жоғары':uv>=3?'Орташа':'Қауіпсіз',
    uv>=8?'b-r':uv>=3?'b-y':'b-g');
}

/* ─── HOURLY ─── */
function renderHourly(h,idx){
  let html='';
  for(let i=idx;i<idx+24;i++){
    if(!h.time[i])break;
    const tm=h.time[i].split('T')[1].slice(0,5);
    const ht=Math.round(h.temperature_2m[i]);
    const hw=h.wind_speed_10m[i]||0;
    const hp=h.precipitation_probability?.[i]||0;
    const code=wc(h.weather_code[i]);
    const tc=ht<=-30?'var(--red)':ht<=-20?'var(--yellow)':'var(--t0)';
    const wbc=hw>10?'b-r':hw>4.5?'b-y':'b-g';
    html+=`<div class="hc${i===idx?' now':''}">
      <div class="hc-time">${i===idx?'ҚАЗІР':tm}</div>
      <div class="hc-ico">${code.i}</div>
      <div class="hc-temp" style="color:${tc}">${ht}°</div>
      ${hp>10?`<div class="hc-prob">☂ ${hp}%</div>`:''}
      <div class="hc-wind st-badge ${wbc}">${hw}м/с</div>
    </div>`;
  }
  document.getElementById('hList').innerHTML=html;
}

/* ─── AQI ─── */
function renderAQI(){
  const a=gAD?.current||{};
  const aqi=a.european_aqi||0;
  let col='var(--green)',lbl='Таза';
  if(aqi>20){col='#8bc34a';lbl='Жақсы';}
  if(aqi>40){col='var(--yellow)';lbl='Орташа';}
  if(aqi>60){col='var(--orange)';lbl='Нашар';}
  if(aqi>80){col='var(--red)';lbl='Зиянды';}
  if(aqi>100){col='var(--purple)';lbl='Өте зиянды';}
  document.getElementById('aqN').innerText=aqi||'<1';
  document.getElementById('aqN').style.color=col;
  document.getElementById('aqL').innerText=lbl;
  document.getElementById('aqL').style.color=col;
  const segs=document.querySelectorAll('.aqi-seg');
  const lvl=Math.min(Math.floor(aqi/20),5);
  segs.forEach((s,i)=>s.className='aqi-seg'+(i>lvl?' dim':''));
  document.getElementById('aq25').innerText=(a.pm2_5||0).toFixed(1);
  document.getElementById('aq10').innerText=(a.pm10||0).toFixed(1);
  document.getElementById('aqN2').innerText=(a.nitrogen_dioxide||0).toFixed(1);
}

/* ─── DAILY ─── */
function renderDaily(d){
  let html='';
  const cur=gWD.current.temperature_2m;

  for(let i=0;i<7;i++){
    const date=new Date(d.time[i]);
    const day=i===0?'Бүгін':date.toLocaleDateString('kk-KZ',{weekday:'long'});
    const mx=Math.round(d.temperature_2m_max[i]),mn=Math.round(d.temperature_2m_min[i]);
    const mw=d.wind_speed_10m_max[i]||0;
    const pp=d.precipitation_probability_max[i]||0;
    const ps=d.precipitation_sum[i]||0;
    const uv=d.uv_index_max?.[i]||0;
    const code=wc(d.weather_code[i]);
    const wc2=mw>10?'c-r':mw>4.5?'c-y':'c-b';
    const wi=mw>10?'<i class="fas fa-exclamation-circle c-r" style="font-size:10px;margin-left:4px"></i>':mw>4.5?'<i class="fas fa-exclamation-triangle c-y" style="font-size:10px;margin-left:4px"></i>':'';

    const barRange=mx-mn||1;
    const dotPct=i===0?Math.max(0,Math.min(100,((cur-mn)/barRange)*100)):null;

    html+=`<div class="dc">
      <div class="dc-top">
        <div class="dc-day">${day}${wi}</div>
        <div class="dc-ico">${code.i}</div>
        <div class="dc-hl"><div class="dc-hi">${mx>0?'+':''}${mx}°</div><div class="dc-lo">${mn}°</div></div>
      </div>
      <div class="dc-bar-wrap">
        <div class="dc-bar-fill" style="left:0%;width:100%"></div>
        ${dotPct!==null?`<div class="dc-bar-dot" style="left:${dotPct}%"></div>`:''}
      </div>
      <div class="dc-meta">
        <span><i class="fas fa-wind ${wc2}"></i>${mw}м/с</span>
        <span><i class="fas fa-umbrella c-b"></i>${pp}%</span>
        <span><i class="fas fa-tint c-b"></i>${ps}мм</span>
        <span><i class="fas fa-sun c-y"></i>UV${uv}</span>
      </div>
    </div>`;
  }
  document.getElementById('dList').innerHTML=html;
}

/* ─── AI CARD ─── */
function renderAI(c){
  document.getElementById('aiTxt').innerText=AI_TEXTS[Math.floor(Date.now()/3600000)%AI_TEXTS.length];
  let ico='🧥',h='Бүгін не киінейін?',s='Ауа-райына сай кеңес';
  const t=c.temperature_2m,ws=c.wind_speed_10m;
  if(t<=-20){ico='🧤';h='Жылы киім міндетті!';s='Қолғап, шарф, ауыр куртка';}
  else if(t<=0){ico='🧣';h='Суықтан қорғаныңыз';s='Шарф пен жеңіл куртка';}
  else if((c.uv_index||0)>=6){ico='🕶';h='Күннен қорғаныңыз';s='Күн крем + көзілдірік';}
  else if(c.precipitation>0){ico='☂️';h='Жаңбырға дайын болыңыз';s='Су өтпейтін киім алыңыз';}
  else if(ws>4.5){ico='🧥';h='Желге сай киініңіз';s='Желтосқар немесе ветровка';}
  document.getElementById('afI').innerText=ico;
  document.getElementById('afH').innerText=h;
  document.getElementById('afS').innerText=s;
}

/* ─── SHARE ─── */
function renderShare(c,d){
  const t=Math.round(c.temperature_2m),code=wc(c.weather_code);
  const hi=Math.round(d.temperature_2m_max[0]),lo=Math.round(d.temperature_2m_min[0]);

  document.getElementById('sPrev').innerHTML=
    `<strong>${code.i} ${gCity}</strong>${gAddr&&gAddr!==gCity?` <span style="font-size:11px;color:var(--t1)">· ${gAddr}</span>`:''}<br>Бүгін <strong>${t>0?'+':''}${t}°</strong> · ${code.t}<br>↑${hi>0?'+':''}${hi}° ↓${lo}° · 💨 ${c.wind_speed_10m}м/с<br><span style="color:var(--t2);font-size:11px">#ULGIPro #BayanOlgii</span>`;

/* ─── QUOTE ─── */
function renderQuote(){
  const q=QUOTES[Math.floor(Math.random()*QUOTES.length)];
  document.getElementById('qCard').innerHTML=`<div class="q-t">"${q.q}"</div><div class="q-a">— ${q.a}</div>`;
}

/* ─── ALERTS TAB ─── */
function renderAlertsTab(c,d){
  const items=[];
  const t=c.temperature_2m,ws=c.wind_speed_10m;
  if(ws>10)       items.push({cls:'ac-bad', ico:'🌪',h:'Дауыл ескертуі',s:`Жел ${ws}м/с. Далаға шықпаңыз.`,tm:'Қазір'});
  if(t<=-30)      items.push({cls:'ac-bad', ico:'🥶',h:'Аяз ескертуі',s:`Температура ${t}°. Қауіпті!`,tm:'Қазір'});
  else if(t<=-20) items.push({cls:'ac-warn',ico:'🌡',h:'Суық ескертуі',s:`Температура ${t}°. Жылы киіміңізді алыңыз.`,tm:'Қазір'});
  if(c.precipitation>2)items.push({cls:'ac-warn',ico:'🌧',h:'Жауын жауып тұр',s:`${c.precipitation}мм. Қолшатыр алыңыз.`,tm:'Қазір'});
  for(let i=1;i<4;i++){
    const mw=d.wind_speed_10m_max?.[i]||0,mn=d.temperature_2m_min?.[i]||0;
    const date=new Date(d.time[i]).toLocaleDateString('kk-KZ',{weekday:'long'});
    if(mw>10)   items.push({cls:'ac-bad', ico:'🌪',h:`${date} — Дауыл`,s:`Жел ${mw}м/с болады.`,tm:date});
    if(mn<=-30) items.push({cls:'ac-bad', ico:'❄️',h:`${date} — Аяз`,s:`Минималды ${mn}°.`,tm:date});
  }
  if(!items.length)items.push({cls:'ac-ok',ico:'✅',h:'Белсенді ескерту жоқ',s:'Барлық параметрлер қалыпты.',tm:'—'});
  document.getElementById('alertsList').innerHTML=items.map(a=>`
    <div class="alert-card ${a.cls} alert-item">
      <div class="alert-icon">${a.ico}</div>
      <div class="alert-body"><div class="alert-head">${a.h}</div><div class="alert-sub">${a.s}<br><span style="font-size:9px;color:var(--t2)">${a.tm}</span></div></div>
    </div>`).join('');
}

/* ─── SETTINGS ─── */
function updSettings(){
  const sc=document.getElementById('setCity'),sa=document.getElementById('setAddr'),sk=document.getElementById('setCoord');
  if(sc)sc.innerText=gCity||'—';if(sa)sa.innerText=gAddr||'—';
  if(sk&&gLat)sk.innerText=`${gLat.toFixed(5)}°N, ${gLon.toFixed(5)}°E`;
  ['rain','wind','frost','daily'].forEach(k=>{
    const e=document.getElementById('tog-'+k);
    if(e)e.className='tog'+(localStorage.getItem('notif_'+k)!=='0'?' on':'');
  });
  const tu=localStorage.getItem('tu')||'C',wu=localStorage.getItem('wu')||'ms';
  ['C','F'].forEach(u=>document.getElementById('ub-'+u).className='ub'+(tu===u?' on':''));
  ['ms','kmh'].forEach(u=>document.getElementById('ub-'+u).className='ub'+(wu===u?' on':''));
}

/* ═══════════════════════════════════════
   SETTINGS ACTIONS
═══════════════════════════════════════ */
function togSet(k){
  const cur=localStorage.getItem('notif_'+k)!=='0';
  localStorage.setItem('notif_'+k,cur?'0':'1');
  const e=document.getElementById('tog-'+k);
  if(e)e.className='tog'+(!cur?' on':'');
  toast(cur?'🔕 Өшірілді':'🔔 Қосылды','Баптау сақталды');
}
function setTU(u){localStorage.setItem('tu',u);['C','F'].forEach(x=>document.getElementById('ub-'+x).className='ub'+(u===x?' on':''));toast(`°${u}`,'Температура бірлігі өзгертілді');}
function setWU(u){localStorage.setItem('wu',u);['ms','kmh'].forEach(x=>document.getElementById('ub-'+x).className='ub'+(u===x?' on':''));toast(u==='ms'?'м/с':'км/с','Жел бірлігі өзгертілді');}
function clearCache(){
  Object.keys(localStorage).filter(k=>k.startsWith('wx_')||k.startsWith('geo_')).forEach(k=>localStorage.removeItem(k));
  toast('🗑 Кэш тазартылды','Деректер жаңартылды');
  setTimeout(fetchWx,500);
}

function sX(){open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(gShare)}`,'_blank');}
function sTg(){open(`https://t.me/share/url?url=https://ulgi.app&text=${encodeURIComponent(gShare)}`,'_blank');}
function sWa(){open(`https://wa.me/?text=${encodeURIComponent(gShare)}`,'_blank');}
async function sCp(){try{await navigator.clipboard.writeText(gShare);toast('✓ Мәтін көшірілді','Бөлісуге дайын');}catch{prompt('Мәтінді көшіріңіз:',gShare);}}

async function sImg(){
  const cv=document.createElement('canvas');cv.width=1080;cv.height=1350;
  const ctx=cv.getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,1350);
  g.addColorStop(0,'#05060f');g.addColorStop(.5,'#080a18');g.addColorStop(1,'#0b0d22');
  ctx.fillStyle=g;ctx.fillRect(0,0,1080,1350);
  const rg=ctx.createRadialGradient(540,400,0,540,400,700);
  rg.addColorStop(0,'rgba(64,196,255,0.15)');
  rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg;ctx.fillRect(0,0,1080,1350);
  
  ctx.fillStyle='#f4f6ff';
  ctx.font='bold 56px system-ui';
  ctx.fillText(gCity,100,150);
  
  ctx.font='32px system-ui';
  ctx.fillStyle='#8899cc';
  ctx.fillText(gShare.split('\n')[1]||'',100,220);
  
  toast('📸 Сурет дайындалуда','Бұл функция жақын арада іске қосылады');
}

function goTab(tID){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.bni').forEach(e=>e.classList.remove('on'));
  
  const targetTab=document.getElementById('tab-'+tID);
  const targetBtn=document.getElementById('bn-'+tID);
  if(targetTab) targetTab.classList.add('on');
  if(targetBtn) targetBtn.classList.add('on');
  
  if(tID==='radar') {
    setTimeout(()=>drawRadar('rCv2','rT2',310),50);
    const rl=document.getElementById('rLoc'), rc=document.getElementById('rCoord');
    if(rl)rl.innerText=gCity||'Анықталмады';
    if(rc&&gLat)rc.innerText=`${gLat.toFixed(4)}°N, ${gLon.toFixed(4)}°E`;
  }
}

function toast(h,b){
  const el=document.getElementById('toast');if(!el)return;
  document.getElementById('tH').innerText=h;
  document.getElementById('tB').innerText=b;
  el.classList.add('show');
  clearTimeout(window._tTM);
  window._tTM=setTimeout(()=>el.classList.remove('show'),3500);
}

function sendAlert(){
  toast('🔔 Хабарландыру','Ауа-райы бақылауы белсенді');
}

function doRefresh(){
  const ico=document.getElementById('rfIco');
  if(ico)ico.style.transform='rotate(360deg)';
  if(gLat&&gLon){
    delC(`wx_${gLat.toFixed(3)}_${gLon.toFixed(3)}`);
    fetchWx();
  } else {
    startGPS();
  }
  setTimeout(()=>{if(ico)ico.style.transform='none';},600);
}

function initApp(){
  buildSel();
  startGPS();
}

window.addEventListener('DOMContentLoaded', ()=>{
  initPin();
});
